name: Install apt packages
description: >
  Install the common set of system packages needed to build Cadmus and
  its thirdparty dependencies. Wraps awalsh128/cache-apt-pkgs-action so
  the package list lives in one place.

runs:
  using: composite
  steps:
    - name: Install apt packages
      uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
      with:
        packages: >-
          git wget curl pkg-config unzip jq patchelf gcc g++ make cmake
          meson ninja-build autoconf automake libtool gperf python3 tcl
          zlib1g-dev libbz2-dev libpng-dev libjpeg-dev libopenjp2-7-dev
          libjbig2dec0-dev libgumbo-dev libfreetype6-dev libharfbuzz-dev
          libdjvulibre-dev libsdl2-dev
        version: 1.0
    - name: Set LIBCLANG_PATH
      shell: bash
      run: |
        libdir=$(llvm-config --libdir 2>/dev/null || true)
        if [ -z "$libdir" ]; then
          candidate=$(find /usr/lib \( -name 'libclang.so*' -o -name 'libclang-*.so*' \) 2>/dev/null | head -1)
          if [ -n "$candidate" ]; then
            libdir=$(dirname "$candidate")
          fi
        fi
        if [ -z "$libdir" ] || [ ! -d "$libdir" ]; then
          echo "::error::Unable to locate libclang; install llvm/clang development packages or set LIBCLANG_PATH."
          exit 1
        fi
        echo "LIBCLANG_PATH=$libdir" >> "$GITHUB_ENV"
