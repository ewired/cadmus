name: Cache thirdparty libraries
description: >
  Restore or save the thirdparty library cache. The cache key covers all files
  that determine which library versions are downloaded and how they are built,
  including the xtask source that encodes download URLs.

inputs:
  kind:
    description: "'kobo-build' for built ARM libs, 'kobo-download' for source-only ARM cache, 'native' for host libs used in tests"
    required: true

runs:
  using: composite
  steps:
    - name: Cache thirdparty libraries (kobo)
      if: startsWith(inputs.kind, 'kobo-')
      uses: actions/cache@v5
      with:
        path: |
          libs/
          thirdparty/
          mupdf_wrapper/
        key: ${{ runner.os }}-thirdparty-libs-${{ inputs.kind }}-${{ hashFiles('thirdparty/**/build-kobo.sh', 'thirdparty/**/*.patch', 'xtask/src/tasks/util/thirdparty.rs') }}

    - name: Cache thirdparty libraries (native)
      if: inputs.kind == 'native'
      uses: actions/cache@v5
      with:
        path: |
          thirdparty/mupdf
          mupdf_wrapper/
        key: ${{ runner.os }}-thirdparty-libs-native-${{ hashFiles('xtask/src/tasks/util/thirdparty.rs', 'xtask/src/tasks/setup_native.rs') }}
