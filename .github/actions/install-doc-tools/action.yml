name: Install doc tools
description: >
  Install and cache mdBook, mdbook-epub, mdbook-mermaid, mdbook-i18n-helpers, Zola,
  and npm dependencies (including puppeteer chrome-headless-shell).
  Versions are pinned here so Renovate tracks them in one place.

inputs:
  node-version:
    description: "Node.js version to install"
    required: false
    default: "24"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Set doc tool versions
      shell: bash
      run: |
        {
          echo "MDBOOK_VERSION=0.5.3"
          echo "MDBOOK_EPUB_REV=21a1c8134134201a2d555313447c96e56e2a8996"
          echo "MDBOOK_MERMAID_VERSION=0.17.0"
          echo "MDBOOK_I18N_HELPERS_VERSION=0.4.0"
          echo "ZOLA_VERSION=0.22.1"
        } >> "$GITHUB_ENV"

    - name: Cache mdBook tools
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/mdbook
          ~/.cache/mdbook-epub
          ~/.cache/mdbook-mermaid
          ~/.cache/mdbook-i18n-helpers
        key: ${{ runner.os }}-mdbook-${{ env.MDBOOK_VERSION }}-epub-${{ env.MDBOOK_EPUB_REV }}-mermaid-${{ env.MDBOOK_MERMAID_VERSION }}-i18n-${{ env.MDBOOK_I18N_HELPERS_VERSION }}

    - name: Cache Zola
      uses: actions/cache@v5
      with:
        path: ~/.cache/zola
        key: ${{ runner.os }}-zola-${{ env.ZOLA_VERSION }}

    - name: Cache puppeteer browsers
      uses: actions/cache@v5
      with:
        path: ~/.cache/puppeteer
        key: ${{ runner.os }}-puppeteer-${{ hashFiles('package-lock.json') }}

    - name: Install npm dependencies
      shell: bash
      run: npm ci

    - name: Install doc tools
      shell: bash
      run: |
        cargo xtask ci install-doc-tools \
          --mdbook-version "$MDBOOK_VERSION" \
          --mdbook-epub-rev "$MDBOOK_EPUB_REV" \
          --mdbook-mermaid-version "$MDBOOK_MERMAID_VERSION" \
          --mdbook-i18n-helpers-version "$MDBOOK_I18N_HELPERS_VERSION" \
          --zola-version "$ZOLA_VERSION"
