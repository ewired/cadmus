name: Build Release Candidate

env:
  NODE_VERSION: "24"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to build (typically the release PR)"
        required: true
        type: number
      issue_number:
        description: "Optional issue number to comment on (if not set, comments on PR)"
        required: false
        type: number

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  attestations: write

jobs:
  build-pr:
    name: Build PR #${{ inputs.pr_number }}
    runs-on: ubuntu-latest

    steps:
      - name: Get PR details
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_data=$(gh pr view "${{ inputs.pr_number }}" --repo "${{ github.repository }}" --json headRefName,headRepository,headRepositoryOwner)
          echo "branch=$(echo "$pr_data" | jq -r '.headRefName')" >> "$GITHUB_OUTPUT"
          echo "repo=$(echo "$pr_data" | jq -r '.headRepositoryOwner.login + "/" + .headRepository.name')" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          repository: ${{ steps.pr.outputs.repo }}
          ref: ${{ steps.pr.outputs.branch }}

      - uses: dtolnay/rust-toolchain@stable
        id: rust-toolchain
        with:
          targets: arm-unknown-linux-gnueabihf

      - uses: ./.github/actions/cargo-cache
        with:
          cachekey: ${{ steps.rust-toolchain.outputs.cachekey }}
          mode: restore

      - name: Build Kobo artifacts
        uses: ./.github/actions/build-kobo
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          gh-oauth-client-id: ${{ secrets.GH_OAUTH_CLIENT_ID }}

      - name: Get commit hash
        id: commit
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/cadmus
            dist/*.sh
            dist/scripts/*
            dist/libs/*.so*
            dist/bin/*
            release-artifacts/*.tgz

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cadmus-kobo-pr${{ inputs.pr_number }}-${{ steps.commit.outputs.short_sha }}
          path: release-artifacts/*
          retention-days: 14

      - name: Comment on PR or Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT_BODY="🎉 Release candidate build completed successfully! Download the artifacts from the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) to test this release."

          if [ -n "${{ inputs.issue_number }}" ]; then
            gh issue comment ${{ inputs.issue_number }} --repo ${{ github.repository }} --body "$COMMENT_BODY"
          else
            gh pr comment ${{ inputs.pr_number }} --repo ${{ github.repository }} --body "$COMMENT_BODY"
          fi
