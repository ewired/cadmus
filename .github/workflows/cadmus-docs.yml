name: Cadmus Documentation

env:
  NODE_VERSION: "24"
  SQLX_OFFLINE: true

on:
  push:
    branches:
      - main
      - master
    paths:
      - docs/**
      - website/**
      - crates/**/*.rs
      - .github/actions/install-doc-tools/**
      - .github/workflows/cadmus-docs.yml
      - package.json
      - package-lock.json
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "cadmus-docs-${{ github.event_name }}-${{ github.event.number || github.ref }}"
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            docs:
              - 'docs/**'
              - 'website/**'
              - 'crates/**/*.rs'
              - '.github/actions/install-doc-tools/**'
              - '.github/workflows/cadmus-docs.yml'
              - 'package.json'
              - 'package-lock.json'

  build:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        id: rust-toolchain

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Set build metadata
        run: |
          {
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "PR_NUMBER=${{ github.event.number }}"
              echo "PR_HEAD_SHA=${{ github.event.pull_request.head.sha }}"
            fi
            echo "GIT_VERSION=$(git describe --tags --always)"
          } >> "$GITHUB_ENV"

      - name: Install doc tools
        uses: ./.github/actions/install-doc-tools
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: ./.github/actions/cargo-cache
        with:
          cachekey: ${{ steps.rust-toolchain.outputs.cachekey }}
          mode: restore

      - name: Build documentation portal
        env:
          RUSTDOCFLAGS: -D warnings
          CADMUS_SKIP_THIRDPARTY_DEPS: "1"
        run: cargo xtask docs

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-build
          path: website/out
          retention-days: 1

      - name: Rebuild website with GitHub Pages basePath
        env:
          NEXT_PUBLIC_BASE_PATH: /cadmus
        run: npm run build
        working-directory: website

      - name: Upload GitHub Pages artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-build-ghpages
          path: website/out
          retention-days: 1

  deploy-cloudflare-production:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: cloudflare-pages-production
      url: https://cadmus-dt6.pages.dev/
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docs-build
          path: website/out

      - name: Deploy to Cloudflare Pages (Production)
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        id: deploy
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy --branch=${{ github.ref_name }} --commit-hash=${{ github.sha }} --commit-dirty=false website/out

  deploy-cloudflare-preview:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: cloudflare-pages-preview
      url: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docs-build
          path: website/out

      - name: Deploy to Cloudflare Pages (Preview)
        id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy --branch="pr-${{ github.event.number }}" --commit-hash="${{ github.sha }}" --commit-dirty=false --commit-message="$PR_TITLE" website/out

  deploy-github-pages:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docs-build-ghpages
          path: website/out

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: website/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  required-docs:
    name: required-docs
    permissions: {}
    needs: [changes, build, deploy-cloudflare-preview]
    if: ${{ always() && github.event_name == 'pull_request' && (cancelled() || contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "::error::One or more required jobs failed or were cancelled"
          exit 1
