name: Cadmus Documentation

env:
  NODE_VERSION: "24"
  SQLX_OFFLINE: true

on:
  push:
    branches:
      - main
      - master
    paths:
      - docs/**
      - docs-portal/**
      - crates/**/*.rs
      - .github/actions/install-doc-tools/**
      - .github/workflows/cadmus-docs.yml
      - package.json
      - package-lock.json
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - docs/**
      - docs-portal/**
      - crates/**/*.rs
      - .github/actions/install-doc-tools/**
      - .github/workflows/cadmus-docs.yml
      - package.json
      - package-lock.json
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "cadmus-docs-${{ github.event_name }}-${{ github.event.number || github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Set build metadata
        run: |
          {
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "PR_NUMBER=${{ github.event.number }}"
              echo "PR_HEAD_SHA=${{ github.event.pull_request.head.sha }}"
              echo "ZOLA_BASE_URL=https://pr-${{ github.event.number }}.cadmus-dt6.pages.dev/"
            else
              echo "ZOLA_BASE_URL=https://cadmus-dt6.pages.dev/"
            fi
            echo "GIT_VERSION=$(git describe --tags --always)"
          } >> "$GITHUB_ENV"

      - name: Install doc tools
        uses: ./.github/actions/install-doc-tools
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache cargo doc
        uses: actions/cache@v5
        with:
          path: target/doc
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-doc-

      - name: Build documentation portal
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo xtask docs --base-url "$ZOLA_BASE_URL"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-build
          path: docs-portal/public
          retention-days: 1

  deploy-cloudflare-production:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: cloudflare-pages-production
      url: https://cadmus-dt6.pages.dev/
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: docs-build
          path: docs-portal/public

      - name: Deploy to Cloudflare Pages (Production)
        uses: cloudflare/wrangler-action@v4
        id: deploy
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy --branch=main --commit-hash=${{ github.sha }} --commit-dirty=false docs-portal/public

  deploy-cloudflare-preview:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork
    environment:
      name: cloudflare-pages-preview
      url: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: docs-build
          path: docs-portal/public

      - name: Deploy to Cloudflare Pages (Preview)
        id: deploy
        uses: cloudflare/wrangler-action@v4
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy --branch="pr-${{ github.event.number }}" --commit-hash="${{ github.sha }}" --commit-dirty=false --commit-message="$PR_TITLE" docs-portal/public

  deploy-github-pages:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: docs-build
          path: docs-portal/public

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs-portal/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
