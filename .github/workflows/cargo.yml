name: Cargo

env:
  NODE_VERSION: "24"
  SQLX_OFFLINE: true

on:
  push:
    branches: [main, master]
  pull_request:
    paths:
      - "**/*.rs"
      - "Cargo.*"
      - "**/Cargo.*"
      - ".github/workflows/cargo.yml"

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        id: rust-toolchain
        with:
          components: rustfmt
      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Check formatting
        run: cargo xtask fmt

  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      test-matrix: ${{ steps.matrix.outputs.test-matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        id: rust-toolchain
      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Generate feature matrix
        id: matrix
        run: cargo xtask ci matrix

  clippy:
    if: github.event_name == 'pull_request'
    needs: generate-matrix

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix).include }}

    runs-on: ${{ matrix.os }}
    name: clippy (${{ matrix.label }}, ${{ matrix.os }})

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        id: rust-toolchain
        with:
          components: clippy
      - &set-build-metadata
        name: Set build metadata
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> "$GITHUB_ENV"
            echo "PR_HEAD_SHA=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_ENV"
          fi
          echo "GIT_VERSION=$(git describe --tags --dirty --always)" >> "$GITHUB_ENV"
      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}
      - &setup-node
        name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - &setup-python
        name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - &install-npm-deps
        name: Install npm dependencies
        run: npm ci

      - &install-mdbook
        name: Install mdBook tools
        uses: ./.github/actions/install-doc-tools

      - &build-docs
        name: Build documentation
        run: cargo xtask docs --mdbook-only
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Run cargo clippy (${{ matrix.label }})
        run: cargo xtask clippy --features "${{ matrix.label }}"

      - name: Save clippy JSON artifact (ubuntu only)
        if: runner.os == 'Linux' && github.event_name == 'pull_request'
        run: |
          slug="${{ matrix.features }}"
          slug="${slug:-default}"
          cargo xtask clippy --features "${{ matrix.label }}" --save-json "clippy-json/${slug}.json"

      - name: Upload clippy JSON artifact
        if: runner.os == 'Linux' && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: clippy-json-${{ matrix.features || 'default' }}
          path: clippy-json/
          retention-days: 1

  clippy-report:
    if: github.event_name == 'pull_request'
    needs: clippy

    permissions:
      contents: read
      pull-requests: write

    runs-on: ubuntu-latest
    name: clippy-report

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        id: rust-toolchain
        with:
          components: clippy
      - *set-build-metadata
      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Download all clippy JSON artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: clippy-json-*
          path: clippy-json
          merge-multiple: true

      - name: Install reviewdog
        uses: reviewdog/action-setup@v1

      - name: Run clippy-report
        run: cargo xtask ci clippy-report --artifacts-dir clippy-json
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    needs: generate-matrix
    env:
      TEST_ROOT_DIR: ${{ github.workspace }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.test-matrix).include }}

    runs-on: ${{ matrix.os }}
    name: test (${{ matrix.label }}, ${{ matrix.os }})

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        id: rust-toolchain
      - *set-build-metadata

      - *setup-node
      - *setup-python
      - *install-npm-deps

      - *install-mdbook
      - *build-docs

      - name: Install apt packages (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: git wget curl pkg-config gcc g++ make cmake meson ninja-build autoconf automake libtool gperf python3 zlib1g-dev libbz2-dev libpng-dev libjpeg-dev libopenjp2-7-dev libjbig2dec0-dev libgumbo-dev libfreetype6-dev libharfbuzz-dev libdjvulibre-dev libsdl2-dev
          version: 1.0
      - name: Cache Homebrew packages (macOS)
        if: runner.os == 'macOS'
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/Homebrew/downloads
            ~/Library/Caches/Homebrew/api
          key: ${{ runner.os }}-brew-${{ hashFiles('.github/workflows/cargo.yml') }}
          restore-keys: ${{ runner.os }}-brew-
      - name: Install Homebrew packages (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2 freetype harfbuzz openjpeg jpeg-turbo libpng jbig2dec gumbo-parser djvulibre pkg-config

      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache thirdparty libraries
        uses: ./.github/actions/cache-thirdparty
        with:
          kind: native

      - name: Set nextest version
        shell: bash
        run: echo "NEXTEST_VERSION=0.9.94" >> "$GITHUB_ENV"

      - name: Cache cargo-nextest
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-nextest
          key: ${{ runner.os }}-nextest-${{ env.NEXTEST_VERSION }}

      - name: Install cargo-nextest
        run: |
          if ! cargo nextest --version 2>/dev/null | grep -q "$NEXTEST_VERSION"; then
            cargo install cargo-nextest --version "$NEXTEST_VERSION" --locked
          fi

      - name: Setup native dependencies
        run: cargo xtask setup-native

      - name: Run cargo test (${{ matrix.label }})
        run: cargo xtask test --features "${{ matrix.label }}"

  build-kobo:
    runs-on: ubuntu-latest

    permissions: &build-permissions
      id-token: write
      contents: read
      attestations: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - *set-build-metadata

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: arm-unknown-linux-gnueabihf

      - name: Build Kobo artifacts
        uses: ./.github/actions/build-kobo
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          gh-oauth-client-id: ${{ secrets.GH_OAUTH_CLIENT_ID }}

      - &get-commit
        name: Get commit hash
        id: commit
        run: echo "short_sha=$(echo '${{ github.event.pull_request.head.sha || github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - &determine-suffix
        name: Determine artifact suffix
        id: artifact
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "suffix=pr${{ github.event.pull_request.number }}-${{ steps.commit.outputs.short_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "suffix=${{ steps.commit.outputs.short_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - &generate-attestation
        name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/cadmus
            dist/*.sh
            dist/scripts/*
            dist/libs/*.so*
            dist/bin/*
            release-artifacts/*.tgz

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cadmus-kobo-${{ steps.artifact.outputs.suffix }}
          path: release-artifacts/*
          retention-days: 7

  build-kobo-test:
    runs-on: ubuntu-latest

    permissions: *build-permissions

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - *set-build-metadata

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: arm-unknown-linux-gnueabihf

      - name: Build Kobo test artifacts
        uses: ./.github/actions/build-kobo
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          gh-oauth-client-id: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          test: "true"

      - *get-commit
      - *determine-suffix

      - *generate-attestation

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cadmus-kobo-test-${{ steps.artifact.outputs.suffix }}
          path: release-artifacts/*
          retention-days: 7
