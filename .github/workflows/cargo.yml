name: Cargo

env:
  NEXTEST_VERSION: "0.9.137"
  NODE_VERSION: "24"
  SQLX_OFFLINE: true
  PKG_CONFIG_PATH_x86_64_unknown_linux_gnu: ${{ github.workspace }}/target/cadmus-build-deps/x86_64-unknown-linux-gnu/sqlite/lib/pkgconfig
  PKG_CONFIG_PATH_arm_unknown_linux_gnueabihf: ${{ github.workspace }}/target/cadmus-build-deps/arm-unknown-linux-gnueabihf/sqlite/lib/pkgconfig
  PKG_CONFIG_ALLOW_CROSS: 1

on:
  push:
    branches: [main, master, "release/*"]
  pull_request:

concurrency:
  group: "cargo-${{ github.event_name }}-${{ github.event.number || github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      cargo: ${{ steps.filter.outputs.cargo }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590
        id: filter
        with:
          filters: |
            cargo:
              - '**/*.rs'
              - 'crates/core/i18n/**'
              - 'Cargo.*'
              - '**/Cargo.*'
              - '.github/workflows/cargo.yml'
              - '.github/actions/apt/**'
              - '.github/actions/build-kobo/**'
              - '.github/actions/build-docs-epub/**'
              - '.github/actions/cargo-cache/**'
              - '.github/actions/install-doc-tools/**'
              - 'build-scripts/**'
              - '.gitmodules'
              - 'mupdf_wrapper/**'
              - 'thirdparty/**'

  format:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.cargo == 'true'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        id: rust-toolchain
        with:
          components: rustfmt
      - name: Restore shared cargo cache
        uses: ./.github/actions/cargo-cache
        with:
          cachekey: ${{ steps.rust-toolchain.outputs.cachekey }}
      - name: Check formatting
        run: cargo xtask fmt

  generate-matrix:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.cargo == 'true'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      test-matrix: ${{ steps.matrix.outputs.test-matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        id: rust-toolchain
      - name: Restore shared cargo cache
        uses: ./.github/actions/cargo-cache
        with:
          cachekey: ${{ steps.rust-toolchain.outputs.cachekey }}
      - name: Generate feature matrix
        id: matrix
        run: cargo xtask ci matrix

  build-docs-epub:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.cargo == 'true'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        id: rust-toolchain
      - name: Restore shared cargo cache
        uses: ./.github/actions/cargo-cache
        with:
          cachekey: ${{ steps.rust-toolchain.outputs.cachekey }}
      - name: Build documentation EPUB
        uses: ./.github/actions/build-docs-epub
        with:
          node-version: ${{ env.NODE_VERSION }}

  cache-warmup:
    needs: [changes, build-docs-epub]
    if: github.event_name != 'pull_request' || needs.changes.outputs.cargo == 'true'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        id: rust-toolchain
        with:
          targets: arm-unknown-linux-gnueabihf
          components: llvm-tools

      - &set-build-metadata
        name: Set build metadata
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> "$GITHUB_ENV"
            echo "PR_HEAD_SHA=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_ENV"
          fi
          echo "GIT_VERSION=$(git describe --tags --dirty --always)" >> "$GITHUB_ENV"

      - name: Install apt packages
        uses: ./.github/actions/apt
      - name: Cache Linaro toolchain
        id: cache-linaro
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/linaro-toolchain
          key: linaro-gcc-4.9.4-2017.01
      - name: Download Linaro toolchain
        if: steps.cache-linaro.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/linaro-toolchain
          cd ~/linaro-toolchain
          wget -q https://developer.arm.com/-/cdn-downloads/permalink/legacy-linaro-gnu-toolchains/4.9-2017.01/gcc-linaro-4.9.4-2017.01-x86_64_arm-linux-gnueabihf.tar.xz
          tar xf gcc-linaro-4.9.4-2017.01-x86_64_arm-linux-gnueabihf.tar.xz --strip-components=1
          rm gcc-linaro-4.9.4-2017.01-x86_64_arm-linux-gnueabihf.tar.xz
      - name: Setup Linaro toolchain
        run: echo "$HOME/linaro-toolchain/bin" >> "$GITHUB_PATH"
      - name: Cache shared cargo artifacts
        id: cache
        uses: ./.github/actions/cargo-cache
        with:
          cachekey: ${{ steps.rust-toolchain.outputs.cachekey }}
          mode: save

      - name: Cache cargo-nextest
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        id: cargo-nextest-cache
        with:
          path: ~/.cargo/bin/cargo-nextest
          key: ${{ runner.os }}-nextest-${{ env.NEXTEST_VERSION }}

      - name: Install cargo-nextest
        if: steps.cargo-nextest-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-nextest --version "$NEXTEST_VERSION" --locked --force

      - name: Cache cargo-llvm-cov
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        id: cargo-llvm-cov-cache
        with:
          path: ~/.cargo/bin/cargo-llvm-cov
          key: ${{ runner.os }}-cargo-llvm-cov

      - name: Install cargo-llvm-cov
        if: steps.cargo-llvm-cov-cache.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Download documentation EPUB
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/download-artifact@v8
        with:
          name: docs-epub
          path: docs/book/epub
      - name: Cache Plato static assets
        if: steps.cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/cache-assets
      - name: Download static assets
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo xtask download-assets
      - name: Build SQLite from source
        if: steps.cache.outputs.cache-hit != 'true'
        run: cargo xtask setup
      - name: Warmup build (native)
        if: steps.cache.outputs.cache-hit != 'true'
        run: cargo check --workspace --all-features --all-targets
      - name: Warmup llvm-cov build
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          cargo llvm-cov nextest-archive \
            --workspace --all-features --all-targets \
            --archive-file target/llvm-cov-warmup.tar.zst
          rm -f target/llvm-cov-warmup.tar.zst
      - name: Warmup build (Kobo release)
        if: steps.cache.outputs.cache-hit != 'true'
        run: cargo build --release --target arm-unknown-linux-gnueabihf -p cadmus

  clippy:
    if: github.event_name == 'pull_request' && needs.changes.outputs.cargo == 'true'
    needs: [changes, generate-matrix, build-docs-epub, cache-warmup]
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix).include }}

    runs-on: ${{ matrix.os }}
    name: clippy (${{ matrix.label }}, ${{ matrix.os }})

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        id: rust-toolchain
        with:
          components: clippy
      - *set-build-metadata
      - name: Restore shared cargo cache
        uses: ./.github/actions/cargo-cache
        with:
          cachekey: ${{ steps.rust-toolchain.outputs.cachekey }}
      - name: Download documentation EPUB
        uses: actions/download-artifact@v8
        with:
          name: docs-epub
          path: docs/book/epub

      - name: Save clippy JSON artifact
        if: github.event_name == 'pull_request'
        run: |
          slug="${{ matrix.features }}"
          slug="${slug:-default}"
          cargo xtask clippy --features "${{ matrix.label }}" --save-json "clippy-json/${slug}.json"

      - name: Upload clippy JSON artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: clippy-json-${{ matrix.features || 'default' }}
          path: clippy-json/
          retention-days: 1

  clippy-report:
    if: github.event_name == 'pull_request' && needs.changes.outputs.cargo == 'true'
    needs: [changes, clippy]

    permissions:
      contents: read
      pull-requests: write

    runs-on: ubuntu-latest
    name: clippy-report

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        id: rust-toolchain
        with:
          components: clippy
      - *set-build-metadata
      - name: Restore shared cargo cache
        uses: ./.github/actions/cargo-cache
        with:
          cachekey: ${{ steps.rust-toolchain.outputs.cachekey }}
      - name: Download all clippy JSON artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: clippy-json-*
          path: clippy-json
          merge-multiple: true

      - name: Install reviewdog
        uses: reviewdog/action-setup@v1

      - name: Run clippy-report
        run: cargo xtask ci clippy-report --artifacts-dir clippy-json
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    needs: [changes, generate-matrix, build-docs-epub, cache-warmup]
    if: github.event_name != 'pull_request' || needs.changes.outputs.cargo == 'true'
    permissions:
      contents: read
    env:
      TEST_ROOT_DIR: ${{ github.workspace }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.test-matrix).include }}

    runs-on: ${{ matrix.os }}
    name: test (${{ matrix.label }}, ${{ matrix.os }})

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        id: rust-toolchain
        with:
          components: llvm-tools
      - *set-build-metadata
      - name: Download documentation EPUB
        uses: actions/download-artifact@v8
        with:
          name: docs-epub
          path: docs/book/epub

      - name: Install apt packages (Linux)
        if: runner.os == 'Linux'
        uses: ./.github/actions/apt
      - name: Cache Homebrew packages (macOS)
        if: runner.os == 'macOS'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/Library/Caches/Homebrew/downloads
            ~/Library/Caches/Homebrew/api
          key: ${{ runner.os }}-brew-${{ hashFiles('.github/workflows/cargo.yml') }}
          restore-keys: ${{ runner.os }}-brew-
      - name: Install Homebrew packages (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2 freetype harfbuzz openjpeg jpeg-turbo libpng jbig2dec gumbo-parser djvulibre pkg-config

      - name: Restore shared cargo cache
        uses: ./.github/actions/cargo-cache
        with:
          cachekey: ${{ steps.rust-toolchain.outputs.cachekey }}

      - name: Cache cargo-nextest
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        id: cargo-nextest-cache
        with:
          path: ~/.cargo/bin/cargo-nextest
          key: ${{ runner.os }}-nextest-${{ env.NEXTEST_VERSION }}

      - name: Install cargo-nextest
        if: steps.cargo-nextest-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-nextest --version "$NEXTEST_VERSION" --locked --force

      - name: Restore cargo-llvm-cov
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        id: cargo-llvm-cov-cache
        with:
          path: ~/.cargo/bin/cargo-llvm-cov
          key: ${{ runner.os }}-cargo-llvm-cov

      - name: Install cargo-llvm-cov
        if: steps.cargo-llvm-cov-cache.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run cargo test with coverage (${{ matrix.label }})
        id: test
        continue-on-error: true
        run: |
          slug="${{ matrix.label }}"
          slug="${slug// + /-}"
          echo "slug=$slug" >> "$GITHUB_OUTPUT"
          cargo xtask test \
            --features "${{ matrix.label }}" \
            --coverage \
            --save-coverage "coverage-json/${slug}.json" \
            --save-junit "test-results/${slug}.junit.xml"

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: test-results/${{ steps.test.outputs.slug }}.junit.xml
          flags: ${{ matrix.label }}
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-json-${{ steps.test.outputs.slug }}
          path: coverage-json/
          retention-days: 1

      - name: Fail if tests failed
        if: steps.test.outcome == 'failure'
        run: exit 1

  coverage-report:
    if: |
      github.event_name == 'pull_request' ||
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    needs: test
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-json-*
          path: coverage-json
          merge-multiple: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: coverage
          files: coverage-json/*.json
          disable_search: true
          fail_ci_if_error: false

  codecov-empty-upload:
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.cargo != 'true'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Notify Codecov of non-coverage changes
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          run_command: empty-upload
          fail_ci_if_error: false

  build-kobo:
    needs: [changes, cache-warmup, build-docs-epub]
    if: github.event_name != 'pull_request' || needs.changes.outputs.cargo == 'true'
    runs-on: ubuntu-latest

    permissions: &build-permissions
      id-token: write
      contents: read
      attestations: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - *set-build-metadata

      - uses: dtolnay/rust-toolchain@stable
        id: rust-toolchain
        with:
          targets: arm-unknown-linux-gnueabihf

      - name: Restore shared cargo cache
        uses: ./.github/actions/cargo-cache
        with:
          cachekey: ${{ steps.rust-toolchain.outputs.cachekey }}
      - name: Download documentation EPUB
        uses: actions/download-artifact@v8
        with:
          name: docs-epub
          path: docs/book/epub

      - name: Build Kobo artifacts
        uses: ./.github/actions/build-kobo
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          gh-oauth-client-id: ${{ secrets.GH_OAUTH_CLIENT_ID }}

      - &get-commit
        name: Get commit hash
        id: commit
        run: echo "short_sha=$(echo '${{ github.event.pull_request.head.sha || github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - &determine-suffix
        name: Determine artifact suffix
        id: artifact
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "suffix=pr${{ github.event.pull_request.number }}-${{ steps.commit.outputs.short_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "suffix=${{ steps.commit.outputs.short_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - &generate-attestation
        name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/cadmus
            dist/*.sh
            dist/scripts/*
            dist/libs/*.so*
            dist/bin/*
            release-artifacts/*.tgz

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cadmus-kobo-${{ steps.artifact.outputs.suffix }}
          path: release-artifacts/*
          retention-days: 7

  build-kobo-test:
    needs: [changes, cache-warmup, build-docs-epub]
    if: github.event_name != 'pull_request' || needs.changes.outputs.cargo == 'true'
    runs-on: ubuntu-latest

    permissions: *build-permissions

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - *set-build-metadata

      - uses: dtolnay/rust-toolchain@stable
        id: rust-toolchain
        with:
          targets: arm-unknown-linux-gnueabihf

      - name: Restore shared cargo cache
        uses: ./.github/actions/cargo-cache
        with:
          cachekey: ${{ steps.rust-toolchain.outputs.cachekey }}
      - name: Download documentation EPUB
        uses: actions/download-artifact@v8
        with:
          name: docs-epub
          path: docs/book/epub

      - name: Build Kobo test artifacts
        uses: ./.github/actions/build-kobo
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          gh-oauth-client-id: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          test: "true"

      - *get-commit
      - *determine-suffix

      - *generate-attestation

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cadmus-kobo-test-${{ steps.artifact.outputs.suffix }}
          path: release-artifacts/*
          retention-days: 7

  required-cargo:
    name: required-cargo
    permissions: {}
    needs:
      - changes
      - format
      - generate-matrix
      - build-docs-epub
      - cache-warmup
      - clippy
      - clippy-report
      - test
      - build-kobo
      - build-kobo-test
    if: ${{ always() && github.event_name == 'pull_request' && (cancelled() || contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "::error::One or more required jobs failed or were cancelled"
          exit 1
