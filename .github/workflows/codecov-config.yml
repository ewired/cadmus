name: Codecov config validation

on:
  pull_request:
    paths:
      - ".codecov.yml"
      - ".github/workflows/codecov-config.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Validate Codecov YAML
        run: |
          curl -sf --retry 5 --retry-delay 2 --retry-all-errors \
            -X POST --data-binary @.codecov.yml https://codecov.io/validate
