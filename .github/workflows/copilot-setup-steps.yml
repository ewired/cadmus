name: Copilot Setup Steps

env:
  MDBOOK_VERSION: "0.5.2"
  MDBOOK_EPUB_REV: "21a1c8134134201a2d555313447c96e56e2a8996"
  MDBOOK_MERMAID_VERSION: "0.17.0"
  NODE_VERSION: "24"

on:
  workflow_call:
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    name: Prepare Copilot Agent Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        id: rust-toolchain
        with:
          components: rustfmt, clippy
          targets: arm-unknown-linux-gnueabihf

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache thirdparty libraries (Kobo cross-compile)
        uses: actions/cache@v5
        with:
          path: |
            libs/
            thirdparty/
            mupdf_wrapper/
          key: ${{ runner.os }}-thirdparty-libs-kobo-${{ hashFiles('thirdparty/download.sh', 'thirdparty/**/build-kobo.sh', 'thirdparty/**/*.patch') }}

      - name: Cache thirdparty libraries (native testing)
        uses: actions/cache@v5
        with:
          path: |
            thirdparty/mupdf
            mupdf_wrapper/
          key: ${{ runner.os }}-thirdparty-libs-native-${{ hashFiles('thirdparty/download.sh') }}

      - name: Cache Linaro toolchain
        id: cache-linaro
        uses: actions/cache@v5
        with:
          path: ~/linaro-toolchain
          key: linaro-gcc-4.9.4-2017.01

      - name: Cache NickelMenu downloads
        uses: actions/cache@v5
        with:
          path: .cache/
          key: ${{ runner.os }}-nickelmenu-${{ hashFiles('bundle.sh') }}

      - name: Cache mdBook tools
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/mdbook
            ~/.cache/mdbook-epub
            ~/.cache/mdbook-mermaid
          key: ${{ runner.os }}-mdbook-${{ env.MDBOOK_VERSION }}-epub-${{ env.MDBOOK_EPUB_REV }}-mermaid-${{ env.MDBOOK_MERMAID_VERSION }}

      - name: Install system packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: git wget curl pkg-config gcc g++ make cmake meson ninja-build autoconf automake libtool gperf python3 zlib1g-dev libbz2-dev libpng-dev libjpeg-dev libopenjp2-7-dev libjbig2dec0-dev libgumbo-dev libfreetype6-dev libharfbuzz-dev libdjvulibre-dev libsdl2-dev shellcheck zip unzip ca-certificates jq patchelf
          version: 1.0

      - name: Download Linaro toolchain
        if: steps.cache-linaro.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/linaro-toolchain
          cd ~/linaro-toolchain
          wget -q https://releases.linaro.org/components/toolchain/binaries/4.9-2017.01/arm-linux-gnueabihf/gcc-linaro-4.9.4-2017.01-x86_64_arm-linux-gnueabihf.tar.xz
          tar xf gcc-linaro-4.9.4-2017.01-x86_64_arm-linux-gnueabihf.tar.xz --strip-components=1
          rm gcc-linaro-4.9.4-2017.01-x86_64_arm-linux-gnueabihf.tar.xz

      - name: Setup Linaro toolchain
        run: |
          echo "$HOME/linaro-toolchain/bin" >> $GITHUB_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install npm dependencies
        run: npm ci

      - name: Install mdBook tools
        run: |
          set -e

          mkdir -p ~/.cache/mdbook ~/.cache/mdbook-epub ~/.cache/mdbook-mermaid ~/.local/bin

          # Install mdbook
          if [ ! -x ~/.cache/mdbook/mdbook ]; then
            curl -sSL -o /tmp/mdbook.tar.gz \
              "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
            tar -xzf /tmp/mdbook.tar.gz -C ~/.cache/mdbook
          fi

          # Install mdbook-epub
          MDBOOK_EPUB_BIN=~/.cache/mdbook-epub/bin/mdbook-epub
          MDBOOK_EPUB_REV_FILE=~/.cache/mdbook-epub/.rev
          MDBOOK_EPUB_NEEDS_INSTALL=0

          if [ ! -x "$MDBOOK_EPUB_BIN" ]; then
            MDBOOK_EPUB_NEEDS_INSTALL=1
          fi

          if [ -f "$MDBOOK_EPUB_REV_FILE" ]; then
            MDBOOK_EPUB_INSTALLED_REV=$(cat "$MDBOOK_EPUB_REV_FILE")
            if [ "$MDBOOK_EPUB_INSTALLED_REV" != "$MDBOOK_EPUB_REV" ]; then
              MDBOOK_EPUB_NEEDS_INSTALL=1
            fi
          else
            MDBOOK_EPUB_NEEDS_INSTALL=1
          fi

          if [ "$MDBOOK_EPUB_NEEDS_INSTALL" -eq 1 ]; then
            rm -rf ~/.cache/mdbook-epub
            MDBOOK_EPUB_DIR=$(mktemp -d)
            MDBOOK_EPUB_TARBALL="$MDBOOK_EPUB_DIR/mdbook-epub.tar.gz"
            MDBOOK_EPUB_URL="https://github.com/Michael-F-Bryan/mdbook-epub/archive/${MDBOOK_EPUB_REV}.tar.gz"

            curl -sSL -o "$MDBOOK_EPUB_TARBALL" "$MDBOOK_EPUB_URL"
            tar -xzf "$MDBOOK_EPUB_TARBALL" -C "$MDBOOK_EPUB_DIR"
            cargo install --path "$MDBOOK_EPUB_DIR/mdbook-epub-$MDBOOK_EPUB_REV" --locked --root ~/.cache/mdbook-epub
            rm -rf "$MDBOOK_EPUB_DIR"
            echo "$MDBOOK_EPUB_REV" > ~/.cache/mdbook-epub/.rev
          fi

          # Install mdbook-mermaid
          MDBOOK_MERMAID_BIN=~/.cache/mdbook-mermaid/bin/mdbook-mermaid
          MDBOOK_MERMAID_VERSION_FILE=~/.cache/mdbook-mermaid/.version
          MDBOOK_MERMAID_NEEDS_INSTALL=0

          if [ ! -x "$MDBOOK_MERMAID_BIN" ]; then
            MDBOOK_MERMAID_NEEDS_INSTALL=1
          fi

          if [ -f "$MDBOOK_MERMAID_VERSION_FILE" ]; then
            MDBOOK_MERMAID_INSTALLED_VERSION=$(cat "$MDBOOK_MERMAID_VERSION_FILE")
            if [ "$MDBOOK_MERMAID_INSTALLED_VERSION" != "$MDBOOK_MERMAID_VERSION" ]; then
              MDBOOK_MERMAID_NEEDS_INSTALL=1
            fi
          else
            MDBOOK_MERMAID_NEEDS_INSTALL=1
          fi

          if [ "$MDBOOK_MERMAID_NEEDS_INSTALL" -eq 1 ]; then
            rm -rf ~/.cache/mdbook-mermaid
            mkdir -p ~/.cache/mdbook-mermaid/bin
            cargo install mdbook-mermaid --version "$MDBOOK_MERMAID_VERSION" --root ~/.cache/mdbook-mermaid
            echo "$MDBOOK_MERMAID_VERSION" > ~/.cache/mdbook-mermaid/.version
          fi

          ln -sf ~/.cache/mdbook/mdbook ~/.local/bin/mdbook
          ln -sf ~/.cache/mdbook-epub/bin/mdbook-epub ~/.local/bin/mdbook-epub
          ln -sf ~/.cache/mdbook-mermaid/bin/mdbook-mermaid ~/.local/bin/mdbook-mermaid
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install mdbook-mermaid assets
        run: mdbook-mermaid install docs

      - name: Download thirdparty dependencies
        run: |
          # Download all thirdparty sources if not cached
          cd thirdparty
          for lib in zlib bzip2 libpng libjpeg openjpeg jbig2dec freetype2 harfbuzz gumbo djvulibre mupdf; do
            if [ ! -d "$lib" ]; then
              ./download.sh "$lib"
            fi
          done
          cd ..

      - name: Setup native dependencies for testing
        env:
          TEST_ROOT_DIR: ${{ github.workspace }}
        run: |
          # Build mupdf wrapper for Linux (required for cargo test)
          cd mupdf_wrapper
          ./build.sh
          cd ..

          # Build MuPDF for native development using system libraries
          cd thirdparty/mupdf
          [ -e .gitattributes ] && rm -rf .git*

          # Clean any previous builds
          make clean || true

          # Generate sources
          make verbose=yes generate

          # Build MuPDF libraries using system libraries
          make verbose=yes \
            mujs=no tesseract=no extract=no archive=no brotli=no barcode=no commercial=no \
            USE_SYSTEM_LIBS=yes \
            XCFLAGS="-DFZ_ENABLE_ICC=0 -DFZ_ENABLE_SPOT_RENDERING=0 -DFZ_ENABLE_ODT_OUTPUT=0 -DFZ_ENABLE_OCR_OUTPUT=0" \
            libs

          cd ../..

          # Create target directory structure
          mkdir -p target/mupdf_wrapper/Linux

          # Copy libmupdf.a
          ln -sf "$(pwd)/thirdparty/mupdf/build/release/libmupdf.a" target/mupdf_wrapper/Linux/

          # Create empty libmupdf-third.a (system libs used instead)
          if [ ! -e thirdparty/mupdf/build/release/libmupdf-third.a ]; then
            ar cr thirdparty/mupdf/build/release/libmupdf-third.a
          fi
          ln -sf "$(pwd)/thirdparty/mupdf/build/release/libmupdf-third.a" target/mupdf_wrapper/Linux/

      - name: Verify installation
        run: |
          rustc --version || true
          cargo --version || true
          cargo fmt --version || true
          cargo clippy --version || true
          arm-linux-gnueabihf-gcc --version || true
          node --version || true
          npm --version || true
          python3 --version || true
          mdbook --version || true
          mdbook-epub --version || true
          mdbook-mermaid --version || true
          # Verify native test setup
          ls -la target/mupdf_wrapper/Linux/ || true
