# https://docs.github.com/en/actions/how-tos/manage-workflow-runs/manage-caches
name: Cleanup github runner caches on closed pull requests
on:
  pull_request:
    types:
      - closed

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Cleanup
        run: |
          echo "Fetching list of caches for $BRANCH"
          caches=$(gh cache list --ref "$BRANCH" --limit 100 --json id,key --jq '.[] | "\(.id)\t\(.key)"')

          if [ -z "$caches" ]; then
            echo "No caches found for this PR."
            exit 0
          fi

          count=$(echo "$caches" | wc -l)
          echo "Found $count cache(s) to delete"

          deleted=0
          failed=0

          ## Setting this to not fail the workflow while deleting cache keys.
          set +e

          while IFS=$'\t' read -r cacheId cacheKey; do
            echo "Deleting cache: $cacheKey (id=$cacheId)"
            if gh cache delete "$cacheId"; then
              deleted=$((deleted + 1))
            else
              echo "  Failed to delete cache: $cacheKey"
              failed=$((failed + 1))
            fi
          done <<< "$caches"

          echo "Cache cleanup complete: $deleted deleted, $failed failed"
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          BRANCH: refs/pull/${{ github.event.pull_request.number }}/merge