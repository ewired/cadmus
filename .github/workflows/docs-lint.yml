name: Docs lint

on:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            docs:
              - 'docs/**'
              - '.agents/skills/**'
              - '**/AGENTS.md'
              - '**/REVIEW.md'
              - '.rumdl.toml'
              - '.prettierignore'
              - 'thirdparty/**/*-kobo.md'
              - 'thirdparty/**/*-cadmus.md'
              - '.github/actions/rumdl-lint/**'
              - '.github/workflows/docs-lint.yml'

      - name: Collect markdown files
        if: steps.filter.outputs.docs == 'true'
        id: files
        run: |
          shopt -s globstar nullglob
          all=(docs/**/*.md .agents/skills/**/*.md **/AGENTS.md **/REVIEW.md thirdparty/**/*-kobo.md thirdparty/**/*-cadmus.md)
          files=()
          for f in "${all[@]}"; do
            [[ "$f" == node_modules/* ]] && continue
            files+=("$f")
          done
          echo "list=${files[*]}" >> "$GITHUB_OUTPUT"

      - name: rumdl
        if: steps.filter.outputs.docs == 'true'
        uses: ./.github/actions/rumdl-lint
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_level: error
          filter_mode: added
          rumdl_flags: ${{ steps.files.outputs.list }}

      - name: No relevant changes
        if: steps.filter.outputs.docs != 'true'
        run: echo "No doc changes — skipping"
