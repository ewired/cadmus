name: Docs lint

on:
  pull_request:
    paths:
      - "docs/**"
      - ".agents/skills/**"
      - "**/AGENTS.md"
      - "**/REVIEW.md"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/docs-lint.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Collect markdown files
        id: files
        run: |
          shopt -s globstar nullglob
          all=(docs/**/*.md .agents/skills/**/*.md **/AGENTS.md **/REVIEW.md)
          files=()
          for f in "${all[@]}"; do
            [[ "$f" == node_modules/* ]] && continue
            files+=("$f")
          done
          echo "list=${files[*]}" >> "$GITHUB_OUTPUT"

      - name: Prettier check
        run: npx prettier --check ${{ steps.files.outputs.list }}

      - name: Markdownlint
        run: npx markdownlint ${{ steps.files.outputs.list }}
