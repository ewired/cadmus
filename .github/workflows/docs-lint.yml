name: Docs lint

on:
  pull_request:
    paths:
      - "docs/**"
      - ".agents/skills/**"
      - "**/AGENTS.md"
      - "**/REVIEW.md"
      - ".github/lint/package.json"
      - "thirdparty/**/*-kobo.md"
      - "thirdparty/**/*-cadmus.md"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/docs-lint.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Collect markdown files
        id: files
        run: |
          shopt -s globstar nullglob
          all=(docs/**/*.md .agents/skills/**/*.md **/AGENTS.md **/REVIEW.md thirdparty/**/*-kobo.md thirdparty/**/*-cadmus.md)
          files=()
          for f in "${all[@]}"; do
            [[ "$f" == node_modules/* ]] && continue
            files+=("$f")
          done
          echo "list=${files[*]}" >> "$GITHUB_OUTPUT"

      - name: Prettier
        uses: EPMatt/reviewdog-action-prettier@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_level: error
          prettier_flags: ${{ steps.files.outputs.list }}
          workdir: .github/lint

      - name: Markdownlint
        uses: reviewdog/action-markdownlint@v0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_level: error
          markdownlint_flags: ${{ steps.files.outputs.list }}
