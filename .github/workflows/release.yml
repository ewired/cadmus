name: Release

env:
  NODE_VERSION: "24"

on:
  push:
    branches:
      - main
      - master
      - release/*
  pull_request:
    paths:
      - .github/workflows/release.yml

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      pr_number: ${{ steps.release.outputs.pr }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          target-branch: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

  build-and-upload:
    name: Build and Upload Release Assets
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'

    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 0
          fetch-tags: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: arm-unknown-linux-gnueabihf

      - name: Build Kobo artifacts
        uses: ./.github/actions/build-kobo
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            dist/cadmus
            dist/*.sh
            dist/scripts/*
            dist/libs/*.so*
            dist/bin/*
            release-artifacts/*.tgz

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release-please.outputs.tag_name }} \
            release-artifacts/cadmus-kobo.tar.gz \
            release-artifacts/KoboRoot.tgz \
            release-artifacts/KoboRoot-nm.tgz \
            --repo ${{ github.repository }}
