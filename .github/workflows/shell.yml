name: Shell

on:
  pull_request:
    paths:
      - "**/*.sh"
      - ".github/workflows/shell.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: ShellCheck
        uses: reviewdog/action-shellcheck@v1.32.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          filter_mode: added

  shfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Shfmt
        uses: reviewdog/action-shfmt@v1.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          filter_mode: added
