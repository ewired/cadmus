[book]
title = "Cadmus Documentation"
language = "en"

[build]
build-dir = "book"
create-missing = true

[preprocessor.mermaid]
command = "mdbook-mermaid"

[preprocessor.mermaid-svg]
command = "python3 mdbook-mermaid-preprocessor.py"
renderer = ["epub"]

[output.epub]

[output.html]
additional-js = ["mermaid.min.js", "mermaid-init.js"]
additional-css = ["custom.css"]
